<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Registro de Cena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4338ca">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="La Mosca">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-8">
    <h1 class="text-3xl font-bold text-center text-indigo-700 mb-2">🍽️ La Mosca</h1>
    <p class="text-center text-gray-400 text-sm mb-8">Ingresá para continuar</p>

    {% if error %}
    <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center font-semibold">
        ❌ {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Usuario</label>
            <input type="text" name="usuario" required autofocus
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Contraseña</label>
            <input type="password" name="contrasena" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>
        <button type="submit"
            class="w-full bg-indigo-600 text-white font-semibold py-2 rounded-lg hover:bg-indigo-700 transition">
            Ingresar →
        </button>
    </form>

    <div class="mt-4 text-center">
        <div class="flex items-center gap-3 mb-4">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="text-xs text-gray-400">o</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>
        <a href="/login-invitado"
            class="block w-full border border-gray-300 text-gray-600 font-semibold py-2 rounded-lg hover:bg-gray-50 transition text-center">
            👀 Entrar como invitado
        </a>
        <p class="text-xs text-gray-400 mt-2">Los datos ingresados como invitado no se guardan</p>
    </div>
</div>

</body>
</html>
